name: Rust CI

on:
  push:
    branches: [main, master]
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/rust-ci.yml'

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.95.0'
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

  check:
    name: Build & Test (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            runner: ubuntu-latest
          - platform: windows
            runner: windows-latest
          - platform: macos
            runner: macos-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libudev-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.95.0'
          components: clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Check Rust compilation
        run: cargo check --manifest-path src-tauri/Cargo.toml --lib --bins

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Lint with clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --lib --bins -- -D warnings

      - name: Check frontend build
        run: npm run build
