name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
          - platform: macos
            runner: macos-latest
          - platform: linux
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libudev-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EspSmith v__VERSION__'
          releaseBody: ''
          releaseDraft: true
          prerelease: false

      - name: Generate latest.json (Windows only)
        if: runner.os == 'Windows'
        run: npm run generate-latest-json

      - name: Upload latest.json (Windows only)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/msi/latest.json

  # 所有平台构建完成后，自动生成发布说明
  generate-release-notes:
    name: Generate Release Notes
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release body from commits
        id: release-body
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > /tmp/release_body.md
            echo "" >> /tmp/release_body.md
            git log --pretty=format:'- %s (%h)' $PREV_TAG..HEAD >> /tmp/release_body.md
          else
            echo "## Initial Release" > /tmp/release_body.md
            echo "" >> /tmp/release_body.md
            git log --pretty=format:'- %s (%h)' >> /tmp/release_body.md
          fi
          echo "" >> /tmp/release_body.md
          echo "---" >> /tmp/release_body.md
          echo "**Full Changelog**: https://github.com/\${{ github.repository }}/compare/$PREV_TAG...\${{ github.ref_name }}" >> /tmp/release_body.md
          cat /tmp/release_body.md

      - name: Update release notes
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          body_path: /tmp/release_body.md
          draft: true
          append_body: false
