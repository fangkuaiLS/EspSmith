<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-b.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EspSmith</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1a1a1f;
        transition: opacity 0.4s ease-out;
      }
      #splash img {
        width: 100px;
        height: 100px;
        pointer-events: none;
      }
      #splash .splash-title {
        margin-top: 20px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: #ffffff;
        letter-spacing: 1px;
      }
      #splash .splash-subtitle {
        margin-top: 6px;
        font-size: 12px;
        color: rgba(255,255,255,0.4);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/logo-b.png" alt="EspSmith" />
      <span class="splash-title">EspSmith</span>
      <span class="splash-subtitle">AI-Powered ESP32 IDE</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
